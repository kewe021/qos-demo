name: Pipeline QoS

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  qualite:
    name: Build et Qualite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilation
        run: mvn compile --no-transfer-progress

      - name: Tests et couverture JaCoCo
        run: mvn test --no-transfer-progress

      - name: Checkstyle
        run: mvn checkstyle:check --no-transfer-progress

      - name: PMD
        run: mvn pmd:check --no-transfer-progress

      - name: SpotBugs
        run: mvn spotbugs:check --no-transfer-progress

      - name: Rapport JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapport-jacoco
          path: target/site/jacoco/